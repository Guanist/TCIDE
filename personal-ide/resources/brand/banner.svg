<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- TCIDE 产品 Banner -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1E1E"/>
      <stop offset="100%" style="stop-color:#2D2D2D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- 装饰性代码行 -->
  <g opacity="0.1" font-family="monospace" font-size="14" fill="#FF8C00">
    <text x="50" y="50">fn main() { println!("Hello from TCIDE!"); }</text>
    <text x="50" y="70">const ide = new TCIDE(); ide.openProject('./my-app');</text>
    <text x="50" y="90">@builder agent: task decomposition complete</text>
    <text x="50" y="110">@coder agent: implementing feature...</text>
    <text x="50" y="130">✓ Build successful in 1.2s</text>
  </g>
  
  <!-- 左侧：Logo 区域 -->
  <g transform="translate(100, 315)">
    <!-- 简化的虎猫头像 -->
    <circle cx="0" cy="-80" r="60" fill="url(#accent)"/>
    <polygon points="-35,-120 -45,-160 -15,-100" fill="#FF8C00"/>
    <polygon points="35,-120 45,-160 15,-100" fill="#FF8C00"/>
    <circle cx="-15" cy="-85" r="8" fill="#FFFFFF"/>
    <circle cx="15" cy="-85" r="8" fill="#FFFFFF"/>
    <circle cx="-15" cy="-85" r="4" fill="#2D5016"/>
    <circle cx="15" cy="-85" r="4" fill="#2D5016"/>
    <ellipse cx="0" cy="-65" rx="6" ry="4" fill="#FF6B6B"/>
    <path d="M -10 -55 Q 0 -50 10 -55" stroke="#000000" stroke-width="2" fill="none"/>
    
    <!-- 代码符号 -->
    <text x="-80" y="20" font-family="monospace" font-size="40" fill="#FF8C00" opacity="0.6">&lt;/&gt;</text>
    <text x="40" y="20" font-family="monospace" font-size="40" fill="#FF8C00" opacity="0.6">{ }</text>
  </g>
  
  <!-- 右侧：产品信息 -->
  <g transform="translate(350, 100)">
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FF8C00">TCIDE</text>
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="24" fill="#D4D4D4">虎猫智能编程助手</text>
    
    <g transform="translate(0, 160)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="20" fill="#FFA500">✨ 双智能体架构</text>
      <text x="0" y="35" font-family="Arial, sans-serif" font-size="20" fill="#FFA500">🚀 本地私有化部署</text>
      <text x="0" y="70" font-family="Arial, sans-serif" font-size="20" fill="#FFA500">🎯 项目级智能理解</text>
      <text x="0" y="105" font-family="Arial, sans-serif" font-size="20" fill="#FFA500">💡 多模型灵活切换</text>
      <text x="0" y="140" font-family="Arial, sans-serif" font-size="20" fill="#FFA500">🔒 完全数据掌控</text>
    </g>
    
    <text x="0" y="280" font-family="Arial, sans-serif" font-size="16" fill="#858585">Powered by DeepSeek · Ollama · VolcEngine</text>
  </g>
</svg>