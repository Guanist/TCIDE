// FIX: parse JSON string into object (MANIFEST is a string, not an object)
var MANIFEST_OBJ={};
try{MANIFEST_OBJ=JSON.parse(MANIFEST);console.log('[PetWindow] manifest keys: '+Object.keys(MANIFEST_OBJ).join(','));}catch(e){console.error('[PetWindow] manifest error: '+e.message);}
var SZ=192,SH=208;
var M={};
var O=["idle","wave","run","failed","review","jump","extra1","extra2","extra3"];
var F=6;
var s="idle",fr=0,t=null,ms=1100,wo=true,wt=null,dr={x:1,y:0};
var isD=false,lx=0,ly=0,md=false,ct=0,txt="",sh=false;
var c=document.getElementById("c");c.width=SZ;c.height=SH;
var cx=c.getContext("2d");cx.imageSmoothingEnabled=false;

function ld(cb){
  var keys=Object.keys(MANIFEST_OBJ),n=keys.length,d=0;
  console.log('[PetWindow] ld() starting with '+n+' keys');
  keys.forEach(function(a){
    var i=new Image();
    i.onload=function(){d++;console.log('[PetWindow] loaded: '+a+' ('+d+'/'+n+')');if(d>=n&&cb)cb();};
    i.onerror=function(){d++;console.error('[PetWindow] FAILED to load: '+a);if(d>=n&&cb)cb();};
    i.src=MANIFEST_OBJ[a];
    M[a]=i;
  });
  setTimeout(function(){if(d<n&&cb)cb();console.log('[PetWindow] ld timeout, loaded '+d+'/'+n);},3000);
}

function r(){
  cx.clearRect(0,0,SZ,SH);
  var i=M[s]||M.idle;
  if(i&&i.complete&&i.naturalWidth>0)cx.drawImage(i,0,0,SZ,SH);
  if(sh&&txt){
    cx.save();
    cx.font="11px monospace";
    var tw=Math.min(cx.measureText(txt).width,160);
    var bx=(SZ-tw-20)/2,by=4,bw=tw+20,bh=22;
    cx.fillStyle="rgba(0,0,0,0.85)";
    cx.beginPath();cx.roundRect(bx,by,bw,bh,[6]);cx.fill();
    cx.fillStyle="#eee";cx.fillText(txt,bx+10,by+15);
    cx.restore();
  }
}

function sp(t2,d){txt=t2||"";sh=!!t2;r();if(t2&&d)setTimeout(function(){sh=false;r();},d);}

function pl(s2){
  if(t)clearInterval(t);
  s=s2||"idle";
  if(!M[s])s="idle";
  fr=0;r();
  t=setInterval(function(){fr=(fr+1)%F;r();},Math.max(60,Math.floor(ms/F)));
}

function sw(){
  if(wt)clearTimeout(wt);
  wt=setTimeout(function(){
    if(!wo)return;
    if(s!=="run"&&s!=="jump")pl("run");
    if(window.api&&window.api.petWander)window.api.petWander(dr.x*14,dr.y*2);
    var a=[0,0.3,-0.3,0.6,-0.6,1.2,-1.2][Math.floor(Math.random()*7)];
    dr.x=Math.cos(a);dr.y=Math.sin(a);sw();
  },1200+Math.random()*1800);
}

c.addEventListener("mousedown",function(e){isD=true;lx=e.screenX;ly=e.screenY;md=false;e.preventDefault();});
window.addEventListener("mousemove",function(e){if(isD&&window.api&&window.api.petMove){window.api.petMove(e.screenX-lx,e.screenY-ly);lx=e.screenX;ly=e.screenY;}});
window.addEventListener("mouseup",function(){isD=false;});

c.addEventListener("click",function(){
  var n=Date.now();
  if(n-ct<300){ct=n;return;}
  ct=n;
  setTimeout(function(){if(!md&&Date.now()-ct>=280)pl("jump");},300);
});
c.addEventListener("dblclick",function(){
  wo=!wo;
  if(wo){pl("run");sw();}else{pl("idle");if(wt)clearTimeout(wt);}
});

if(window.api&&window.api.on){
  window.api.on("pet-state-change",function(_e,s2){
    if(s2==="thinking"){sp("Thinking...",2000);pl("review");}
    else if(s2==="tool"){sp("Working...",2000);pl("run");}
    else if(s2==="success"){sp("Done!",1500);pl("jump");}
    else if(s2==="error"){sp("Oops!",1500);pl("failed");}
    else if(s2==="idle"){sp("");if(wo){pl("run");sw();}else pl("idle");}
  });
}

ld(function(){
  console.log("Mascots loaded: "+Object.keys(M).length+" images");
  if(M.idle){pl("idle");if(wo)sw();}
});
console.log("[PetWindow] boot OK, manifest states: "+Object.keys(MANIFEST_OBJ).length);
})();
</script>
